apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
spec:
  replicas: 1
  serviceName: loki
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
      annotations:
        fluentbit.io/parser: logfmt
        prometheus.io/scrape: "true"
        prometheus.io/port: http
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: loki
          image: ${image.loki}
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9095
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 1
            periodSeconds: 1
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /ready
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki/local-config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /data/loki
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 10001
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki
        - name: tmp
          emptyDir: {}
