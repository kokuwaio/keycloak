[SERVICE]
    Flush         5
    Grace         1
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     8080
    Health_Check  On
    Mem_Buf_Limit 40MB

[INPUT]
    Name                 tail
    Tag                  kube.*
    Path                 /var/log/containers/*.log
    DB                   /var/fluent-bit/flb_kube.db
    Parser               cri
    Refresh_Interval     1

[FILTER]
    Name                 kubernetes
    Match                kube.*
    Merge_Log            On
    Keep_Log             false
    K8S-Logging.Parser   On
    K8S-Logging.Exclude  On
    
[FILTER]
    Name                 grep
    Match                kube.*
    Exclude              container_name coredns

[FILTER]
    Name                 modify
    Match                kube.*
    Rename               severity level
    Rename               lvl level
    Rename               msg log.message
    Rename               loggerName logger
    Rename               threadName thread

[OUTPUT]
    Name                 loki
    Match                kube.*
    labels               namespace=$kubernetes['namespace_name'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name'],level=$level,logger=$logger
    auto_kubernetes_labels  On
    Host                 loki
    Port                 80
