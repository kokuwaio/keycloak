[PARSER]
    Name         cri
    Format       regex
    Regex        /^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<tag>F|P) (?<log>.*)$/
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

[PARSER]
    Name         json-timestamp
    Format       json
    Time_Key     timestamp

[PARSER]
    Name         logfmt
    Format       logfmt
    Time_Key     ts

[PARSER]
    Name         logfmt-t
    Format       logfmt
    Time_Key     t

[PARSER]
    Name         fluent-bit
    Format       regex
    Regex        /^\[(?<time>.+)\] \[( )*(?<level>.*)\] \[(?<component>.*)\] (?<message>.*)$/
    Time_Key     time
    Time_Format  %Y/%m/%d %H:%M:%S

[PARSER]
    Name        klog
    Format      regex
    Regex       ^(ERROR: logging before flag\.Parse: )?(?<level>[A-Z])(?<time>[0-9]{4} [0-2][0-9]:[0-9][0-9]:[0-9][0-9]\.[0-9]+)[ ]*[0-9] (?<logger>[^\s-]*)\] (?<message>.*)$
    Time_Key    time
    Time_Format %m%d %H:%M:%S.%L
