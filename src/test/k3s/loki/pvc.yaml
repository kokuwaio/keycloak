apiVersion: v1
kind: PersistentVolume
metadata:
  name: loki
spec:
  hostPath:
    path: /var/lib/rancher/k3s/storage/loki0
    type: DirectoryOrCreate
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki
spec:
  volumeName: loki
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
